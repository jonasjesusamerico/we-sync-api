services:
  nginx:
    image: nginx:1.27-alpine
    container_name: we-sync-nginx

    ports:
      - "8080:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - app1
      - app2

    cpus: 0.30
    mem_limit: 64m

  app1:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: we-sync-api-1

    env_file:
      - .env

    depends_on:
      - postgres

    cpus: 0.35
    mem_limit: 100m

  app2:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: we-sync-api-2

    env_file:
      - .env

    depends_on:
      - postgres

    cpus: 0.35
    mem_limit: 100m

  postgres:
    image: postgres:17

    container_name: we-sync-postgres

    environment:
      POSTGRES_DB: finance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    cpus: 0.60
    mem_limit: 250m

    command:
      - postgres
      - -c
      - shared_buffers=32MB
      - -c
      - work_mem=1MB
      - -c
      - maintenance_work_mem=16MB
      - -c
      - effective_cache_size=96MB
      - -c
      - max_connections=40

volumes:
  postgres_data: